apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: tanzu-java-web-app
spec:
  parentRefs:
  - group: networking.tanzu.vmware.com
    kind: Entrypoint
    name: main
  rules:
  - backendRefs:
    - group: apps.tanzu.vmware.com
      kind: ContainerApp
      name: tanzu-java-web-app
      port: 8080
